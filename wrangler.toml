# Cloudflare Worker Configuration
# This is a template for deploying workers with this package

name = "worker"
main = "src/worker.ts"
compatibility_date = "2024-01-01"

# KV Namespaces
# [[kv_namespaces]]
# binding = "KV"
# id = "your-kv-namespace-id"

# R2 Buckets
# [[r2_buckets]]
# binding = "R2"
# bucket_name = "your-bucket-name"

# D1 Databases
# [[d1_databases]]
# binding = "D1"
# database_name = "your-database-name"

# Environment variables
# [vars]
# API_KEY = "your-api-key"

# Staging environment
# [env.staging]
# name = "worker-staging"

# Production environment
# [env.production]
# name = "worker-production"
